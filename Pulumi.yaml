name: healthcare-clinic
runtime: nodejs
main: infra/index.ts
config:
  postgres.db:
    type: string
    description: Database name
  postgres.host:
    type: string
    description: Database host
  postgres.password:
    type: string
    description: Database password
    secret: true
  postgres.port:
    type: string
    description: Database port
  postgres.ssl:
    type: string
    description: Enable SSL for database connections
  postgres.user:
    type: string
    description: Database user
    secret: true
  app.domain:
    type: string
    description: Application domain
  app.port:
    type: string
    description: Application port
  app.ssl:
    type: string
    description: Enable SSL for the application
  app.auth_secret:
    type: string
    description: Authentication secret
    secret: true
  app.google_client_id:
    type: string
    description: Google OAuth client ID
    secret: true
  app.google_client_secret:
    type: string
    description: Google OAuth client secret
    secret: true
  app.storage_access_key:
    type: string
    description: Storage access key
    secret: true
  app.storage_bucket:
    type: string
    description: Storage bucket name
  app.storage_endpoint:
    type: string
    description: Storage endpoint URL
  app.storage_force_path_style:
    type: string
    description: Use path-style addressing for storage
  app.storage_region:
    type: string
    description: Storage region
  app.storage_secret_key:
    type: string
    description: Storage secret key
    secret: true
